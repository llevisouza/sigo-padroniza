name: desktop-java-ci

on:
  push:
    paths:
      - 'desktop-java/**'
      - '.github/workflows/desktop-java-ci.yml'
  pull_request:
    paths:
      - 'desktop-java/**'
      - '.github/workflows/desktop-java-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and coverage
        run: gradle --no-daemon clean test jacocoTestReport
